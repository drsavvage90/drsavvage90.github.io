<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="404 — page not found · seth nordgren" />
<meta name="theme-color" content="#0a0e0a" />
<meta name="robots" content="noindex, nofollow" />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0e0a'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-family='monospace' font-size='38' font-weight='700' fill='%2300ff7f'%3ESN%3C/text%3E%3C/svg%3E" />

<title>404 // segfault — seth nordgren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0a;
    --bg-elev: #0f140f;
    --fg: #d4e4d4;
    --fg-dim: #7a8a7a;
    --fg-faint: #3d4a3d;
    --accent: #00ff7f;
    --danger: #ff6b6b;
    --border: #1f2a1f;
    --border-bright: #2d3d2d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(transparent 0%, rgba(0, 255, 127, 0.015) 50%, transparent 100%);
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 1000;
    animation: scanlines 8s linear infinite;
  }
  @keyframes scanlines {
    0% { background-position: 0 0; }
    100% { background-position: 0 100%; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
    pointer-events: none;
    z-index: 999;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 127, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 127, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  ::selection { background: var(--accent); color: var(--bg); }

  .panel {
    position: relative;
    z-index: 1;
    max-width: 640px;
    width: 100%;
    border: 1px solid var(--border-bright);
    background: var(--bg-elev);
    padding: 40px 36px;
  }

  .panel::before {
    content: '~/error.log';
    position: absolute;
    top: -1px;
    left: 16px;
    transform: translateY(-50%);
    background: var(--bg);
    padding: 0 8px;
    color: var(--fg-dim);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .preamble {
    font-size: 13px;
    color: var(--fg-dim);
    line-height: 1.8;
    margin-bottom: 28px;
  }
  .preamble .comment { color: var(--fg-faint); }
  .preamble .prompt { color: var(--accent); }
  .preamble .accent { color: var(--accent); }
  .preamble .err { color: var(--danger); }

  .code {
    font-size: clamp(72px, 16vw, 144px);
    font-weight: 500;
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--fg);
    margin-bottom: 16px;
  }
  .code .accent { color: var(--accent); }
  .code .cursor {
    display: inline-block;
    width: 0.55em;
    height: 0.85em;
    background: var(--accent);
    margin-left: 6px;
    vertical-align: baseline;
    animation: blink 1.06s step-end infinite;
    box-shadow: 0 0 12px var(--accent);
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .title {
    font-size: 18px;
    color: var(--fg);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .title .accent { color: var(--accent); }

  .blurb {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    color: var(--fg-dim);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 480px;
  }

  .links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .links a {
    padding: 12px 20px;
    border: 1px solid var(--border-bright);
    color: var(--fg);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.2s;
  }
  .links a:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0, 255, 127, 0.05);
  }
  .links a.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 500;
  }
  .links a.primary:hover {
    background: transparent;
    color: var(--accent);
  }

  @media (max-width: 500px) {
    .panel { padding: 32px 24px; }
    .preamble { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="panel">
  <div class="preamble">
    <div><span class="comment"># last login: page not found</span></div>
    <div><span class="prompt">$</span> cat <span class="accent">requested.html</span></div>
    <div><span class="err">→ error: ENOENT — no such file or directory</span></div>
  </div>

  <div class="code">4<span class="accent">0</span>4<span class="cursor"></span></div>
  <div class="title">segfault <span class="accent">·</span> page not found</div>
  <p class="blurb">the page you tried to open doesn't exist, or it was moved. probably a typo, possibly a stale link. either way — let's get you somewhere real.</p>

  <div class="links">
    <a href="index.html" class="primary">cd ~ <span style="margin-left: 4px">→</span></a>
    <a href="index.html#projects">./projects</a>
    <a href="index.html#contact">./contact</a>
  </div>
</div>

</body>
</html>
