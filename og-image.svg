<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Dr. Seth Nordgren portfolio preview</title>
  <desc id="desc">Social preview image for Dr. Seth Nordgren, CTO of Enigma Software Systems, software developer, and BCBA-D.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="0.48" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#efe7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#4f46e5" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="100" r="220" fill="#ffffff" opacity="0.72"/>
  <circle cx="190" cy="520" r="260" fill="#dbeafe" opacity="0.55"/>
  <circle cx="1010" cy="520" r="280" fill="#ede9fe" opacity="0.68"/>
  <g filter="url(#softShadow)">
    <rect x="80" y="78" width="1040" height="474" rx="36" fill="#ffffff" opacity="0.78"/>
    <rect x="80" y="78" width="1040" height="474" rx="36" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  </g>
  <circle cx="202" cy="196" r="66" fill="url(#accent)"/>
  <text x="202" y="216" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff">SN</text>
  <text x="302" y="164" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#5b6ee1">CTO | Software Developer | BCBA-D</text>
  <text x="302" y="232" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#111827">Dr. Seth Nordgren</text>
  <text x="302" y="302" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" fill="#374151">Technology leadership informed by behavior science.</text>
  <text x="302" y="365" font-family="Inter, Arial, sans-serif" font-size="28" fill="#4b5563">AI-enabled workflows, full-stack platforms,</text>
  <text x="302" y="406" font-family="Inter, Arial, sans-serif" font-size="28" fill="#4b5563">and practical systems for real-world teams.</text>
  <rect x="302" y="456" width="300" height="46" rx="23" fill="#eef2ff"/>
  <text x="452" y="487" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#4f46e5">Enigma Software Systems</text>
  <rect x="626" y="456" width="206" height="46" rx="23" fill="#f3f4f6"/>
  <text x="729" y="487" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#374151">drsavvage90</text>
</svg>
