<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Seth Nordgren — CTO, Enigma Software Systems</title>
  <desc id="desc">Social preview · Seth Nordgren, CTO of Enigma Software Systems, builder, behavior scientist.</desc>
  <defs>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00ff7f" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff7f" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#00ff7f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00ff7f" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0a0e0a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#scan)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- top bar -->
  <line x1="0" y1="58" x2="1200" y2="58" stroke="#1f2a1f" stroke-width="1"/>
  <circle cx="34" cy="29" r="6" fill="#ff6b6b"/>
  <circle cx="56" cy="29" r="6" fill="#ffb454"/>
  <circle cx="78" cy="29" r="6" fill="#00ff7f"/>
  <text x="108" y="35" font-family="JetBrains Mono, monospace" font-size="14" fill="#7a8a7a">seth@enigma:<tspan fill="#00ff7f">~/portfolio</tspan>$</text>
  <text x="1080" y="35" font-family="JetBrains Mono, monospace" font-size="14" fill="#00ff7f">● online</text>

  <!-- preamble -->
  <g font-family="JetBrains Mono, monospace" font-size="18">
    <text x="80" y="140" fill="#3d4a3d"># welcome.sh — last login: today</text>
    <text x="80" y="170" fill="#7a8a7a"><tspan fill="#00ff7f">$</tspan> whoami</text>
    <text x="80" y="200" fill="#7a8a7a"><tspan fill="#3d4a3d">→ </tspan><tspan fill="#00ff7f">seth_nordgren</tspan> <tspan fill="#3d4a3d">// cto, builder, behavior scientist</tspan></text>
  </g>

  <!-- hero name -->
  <g filter="url(#glow)" font-family="JetBrains Mono, monospace" font-weight="500">
    <text x="80" y="340" font-size="120" fill="#d4e4d4" letter-spacing="-4">seth</text>
    <text x="80" y="450" font-size="120" fill="#d4e4d4" letter-spacing="-4">nord<tspan fill="#00ff7f">gren</tspan></text>
  </g>
  <rect x="660" y="370" width="36" height="80" fill="#00ff7f" opacity="0.95"/>

  <!-- role line -->
  <text x="80" y="500" font-family="JetBrains Mono, monospace" font-size="22" fill="#7a8a7a">
    <tspan fill="#00ff7f">cto</tspan> <tspan fill="#d4e4d4">@</tspan> enigma software systems <tspan fill="#3d4a3d">·</tspan> behavior scientist who ships
  </text>

  <!-- footer strip -->
  <line x1="0" y1="568" x2="1200" y2="568" stroke="#1f2a1f" stroke-dasharray="4 4"/>
  <text x="80" y="598" font-family="JetBrains Mono, monospace" font-size="13" fill="#3d4a3d">© 2026 seth nordgren <tspan fill="#7a8a7a">·</tspan> built in <tspan fill="#00ff7f">columbus, oh</tspan></text>
  <text x="1120" y="598" font-family="JetBrains Mono, monospace" font-size="13" fill="#7a8a7a" text-anchor="end">drsavvage90.github.io</text>
</svg>
